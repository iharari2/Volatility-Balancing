services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
      POSTGRES_DB: app
    ports:
      - '127.0.0.1:5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - '127.0.0.1:6379:6379'

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      PYTHONUNBUFFERED: '1'
      # Persistence
      APP_PERSISTENCE: sql
      APP_EVENTS: sql
      APP_IDEMPOTENCY: memory
      APP_AUTO_CREATE: 'true'
      SQL_URL: postgresql://postgres:postgres@postgres:5432/app
      REDIS_URL: redis://redis:6379/0
      # Auth
      JWT_SECRET_KEY: CHANGE-ME-IN-PRODUCTION
      JWT_EXPIRE_HOURS: '24'
      # Broker
      APP_BROKER: stub
      STUB_BROKER_FILL_MODE: immediate
    ports:
      - '8000:8000'
    depends_on:
      - postgres
      - redis
    # Dev override (optional):
    # command: ["python","-m","uvicorn","--app-dir","backend","app.main:app","--reload","--host","0.0.0.0","--port","8000"]

volumes:
  pgdata:
