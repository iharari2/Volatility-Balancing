name: ci-cd
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PY_VERSION: "3.12"
  NODE_VERSION: "20"

jobs:
  # Lint + unit tests in one job — saves a full runner spin-up vs separate lint job
  backend-tests:
    runs-on: ubuntu-latest
    env:
      APP_PERSISTENCE: memory
      TRADING_WORKER_ENABLED: "false"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PY_VERSION }}

      - name: Install uv
        run: pip install uv --quiet

      - name: Install deps (uv — much faster than pip)
        run: uv pip install --system -r backend/requirements.txt pytest pytest-cov pytest-xdist ruff

      - name: Lint
        run: ruff check backend/

      - name: Unit tests
        env:
          PYTHONPATH: backend
        run: pytest backend/tests/unit --cov=backend/app --cov=backend/domain --cov=backend/application --cov-report=term-missing --cov-fail-under=25 -n auto --dist worksteal -q

  # Runs in parallel with backend-tests — no longer gated by lint
  integration-tests:
    runs-on: ubuntu-latest
    env:
      APP_PERSISTENCE: memory
      TRADING_WORKER_ENABLED: "false"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PY_VERSION }}

      - name: Install uv
        run: pip install uv --quiet

      - name: Install deps
        run: uv pip install --system -r backend/requirements.txt pytest pytest-xdist

      - name: Integration tests
        env:
          PYTHONPATH: backend
        run: pytest backend/tests/integration -q --tb=short -n auto --dist worksteal

  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install, lint & build
        working-directory: frontend
        run: |
          npm ci
          npm run lint
          npm run build

  # Production deployment — only on push to main, all three jobs must pass
  deploy-production:
    runs-on: ubuntu-latest
    needs: [backend-tests, integration-tests, frontend-build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: pip install requests pytz

      - name: Trading Safety Check
        id: safety
        run: python scripts/check_trading_safety.py --ci-mode
        env:
          API_BASE: ${{ secrets.API_BASE_PRODUCTION }}
          API_TOKEN: ${{ secrets.API_TOKEN_PRODUCTION }}
        continue-on-error: true

      - name: Warn if market hours
        if: steps.safety.outcome == 'failure'
        run: echo "::warning::Deploying during market hours or with active trading. Proceed with caution."

      - name: Deploy to Fly.io
        uses: superfly/flyctl-actions/setup-flyctl@master

      - run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Post-deploy smoke test
        run: |
          curl -f ${{ secrets.API_BASE_PRODUCTION }}/v1/healthz
          curl -f ${{ secrets.API_BASE_PRODUCTION }}/v1/version

      - name: Create version tag
        run: |
          BASE="v$(date +%Y.%m.%d)"
          EXISTING=$(git ls-remote --tags origin "${BASE}*" | wc -l)
          if [ "$EXISTING" -gt 0 ]; then
            VERSION="${BASE}.$(( EXISTING + 1 ))"
          else
            VERSION="${BASE}"
          fi
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git tag -a "$VERSION" -m "Release $VERSION"
          git push origin "$VERSION"
          echo "::notice::Created release tag: $VERSION"
