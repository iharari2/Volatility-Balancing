# fly.toml — Fly.io app configuration for Volatility-Balancing backend
# https://fly.io/docs/reference/configuration/

app = "volatility-balancing"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  APP_PERSISTENCE = "sql"
  APP_EVENTS = "sql"
  APP_IDEMPOTENCY = "memory"
  APP_AUTO_CREATE = "true"
  APP_BROKER = "stub"
  TRADING_WORKER_ENABLED = "true"
  ALPACA_PAPER = "true"

# Secrets (set via `fly secrets set`, never committed):
#   SQL_URL
#   JWT_SECRET_KEY
#   ALPACA_API_KEY       (only if APP_BROKER=alpaca)
#   ALPACA_SECRET_KEY    (only if APP_BROKER=alpaca)

[[services]]
  protocol = "tcp"
  internal_port = 8000

  [[services.ports]]
    handlers = ["http"]
    port = 80
    force_https = true

  [[services.ports]]
    handlers = ["tls", "http"]
    port = 443

  [services.concurrency]
    type = "connections"
    hard_limit = 25
    soft_limit = 20

  [[services.http_checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "10s"
    method = "GET"
    path = "/v1/healthz"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
  count = 1
